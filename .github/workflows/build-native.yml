name: Build Native App

# Real native Life OS — Kotlin + Compose Multiplatform. One codebase builds a
# native Android APK and a native Windows desktop app (no WebView). Built
# entirely in the cloud, no local machine — same as the rest of the project.

on:
  push:
    branches: [claude/lifeos-dev-setup-dpipr6, main]
    paths:
      - 'native/**'
      - '.github/workflows/build-native.yml'
  workflow_dispatch:

jobs:
  android:
    name: Native Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build native Android APK
        working-directory: native
        env:
          # Baked into the APK at build time so the app ships working without each
          # user pasting a key. Stored as a repo secret — never in source. Absent
          # (empty) on forks/PRs, where the app falls back to a user-entered key.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: gradle :composeApp:assembleDebug --no-daemon --stacktrace

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: lifeos-native-android
          path: native/composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  windows:
    name: Native Windows App
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Package native Windows app (.msi)
        working-directory: native
        run: gradle :composeApp:packageDistributionForCurrentOS --no-daemon --stacktrace

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: lifeos-native-windows
          path: native/composeApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error
