# Deploys the Life OS Supabase Edge Function(s) straight from the repo -- no
# local terminal needed. Runs automatically when a function changes on main,
# and can be triggered by hand from the Actions tab (Run workflow).
#
# One-time setup (all in web UIs, no local commands):
#   GitHub -> repo Settings -> Secrets and variables -> Actions -> add:
#     SUPABASE_ACCESS_TOKEN   (Supabase dashboard -> Account -> Access Tokens)
#     VAPID_PRIVATE_KEY       (the private key generated for Web Push)
# The VAPID public key + subject aren't secret, so they're set inline below.
name: Deploy Supabase Functions

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'supabase/functions/send-push/**'
      - '.github/workflows/deploy-supabase-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ukqdbxxhxxafbcnkmskg
      VAPID_PUBLIC_KEY: BIyvZOWXLeZFcndZ4E1NXgw8Eib0syM5q7iGEtQUyun0dMPJxRyinqiXyefvY6o6qYseZtnfYRLEzadN9ElJJic
      VAPID_SUBJECT: mailto:alekpeed@gmail.com
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push function secrets (VAPID)
        run: |
          supabase secrets set --project-ref "$PROJECT_REF" \
            VAPID_PUBLIC_KEY="$VAPID_PUBLIC_KEY" \
            VAPID_PRIVATE_KEY="${{ secrets.VAPID_PRIVATE_KEY }}" \
            VAPID_SUBJECT="$VAPID_SUBJECT"

      - name: Deploy send-push
        run: supabase functions deploy send-push --project-ref "$PROJECT_REF"
